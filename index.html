<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cutt Music</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: #1e1e1e;
      border-radius: 16px;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-top: 0;
    }

    p {
      text-align: center;
      color: #ccc;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input, select {
      background: #2b2b2b;
      color: white;
    }

    button {
      margin-top: 20px;
      background: #00b894;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00a383;
    }

    .hidden {
      display: none;
    }

    .error, .success {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
    }

    .error {
      background: #b33939;
    }

    .success {
      background: #218c74;
    }

    .list {
      margin-top: 20px;
      background: #2a2a2a;
      border-radius: 12px;
      padding: 12px;
    }

    .item {
      padding: 8px 0;
      border-bottom: 1px solid #444;
      font-size: 14px;
      word-break: break-word;
    }

    .item:last-child {
      border-bottom: none;
    }

    .small {
      font-size: 13px;
      color: #bbb;
      margin-top: 8px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cutt Music</h1>
    <p>Découpe un audio en 10 s, 15 s, 30 s ou durée personnalisée, puis télécharge tous les morceaux.</p>

    <label for="audioFile">Choisir un fichier audio</label>
    <input type="file" id="audioFile" accept="audio/*" />

    <label for="segmentLength">Durée de découpe</label>
    <select id="segmentLength">
      <option value="10">10 secondes</option>
      <option value="15">15 secondes</option>
      <option value="30">30 secondes</option>
      <option value="custom">Personnalisée</option>
    </select>

    <label for="customLength">Durée personnalisée en secondes</label>
    <input type="number" id="customLength" min="1" placeholder="Ex : 12" />

    <button id="cutButton">Découper et télécharger</button>

    <div id="message"></div>
    <div id="fileList" class="list hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script>
    const audioFileInput = document.getElementById("audioFile");
    const segmentLengthSelect = document.getElementById("segmentLength");
    const customLengthInput = document.getElementById("customLength");
    const cutButton = document.getElementById("cutButton");
    const messageDiv = document.getElementById("message");
    const fileListDiv = document.getElementById("fileList");

    function showError(text) {
      messageDiv.className = "error";
      messageDiv.textContent = text;
    }

    function showSuccess(text) {
      messageDiv.className = "success";
      messageDiv.textContent = text;
    }

    function clearMessage() {
      messageDiv.className = "";
      messageDiv.textContent = "";
    }

    function sanitizeName(name) {
      return name.replace(/\.[^/.]+$/, "").replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function floatTo16BitPCM(float32Array) {
      const buffer = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        let s = Math.max(-1, Math.min(1, float32Array[i]));
        buffer[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return buffer;
    }

    function interleaveChannels(left, right) {
      const length = left.length + right.length;
      const result = new Float32Array(length);
      let index = 0;
      let inputIndex = 0;

      while (index < length) {
        result[index++] = left[inputIndex];
        result[index++] = right[inputIndex];
        inputIndex++;
      }
      return result;
    }

    function encodeMp3FromAudioBuffer(audioBuffer, startSec, endSec) {
      const sampleRate = audioBuffer.sampleRate;
      const channels = audioBuffer.numberOfChannels;
      const startSample = Math.floor(startSec * sampleRate);
      const endSample = Math.min(Math.floor(endSec * sampleRate), audioBuffer.length);

      const kbps = 128;
      let mp3encoder;
      let mp3Data = [];

      if (channels === 1) {
        const mono = audioBuffer.getChannelData(0).slice(startSample, endSample);
        const mono16 = floatTo16BitPCM(mono);
        mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, kbps);

        const blockSize = 1152;
        for (let i = 0; i < mono16.length; i += blockSize) {
          const chunk = mono16.subarray(i, i + blockSize);
          const mp3buf = mp3encoder.encodeBuffer(chunk);
          if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
      } else {
        const left = audioBuffer.getChannelData(0).slice(startSample, endSample);
        const right = audioBuffer.getChannelData(1).slice(startSample, endSample);
        const left16 = floatTo16BitPCM(left);
        const right16 = floatTo16BitPCM(right);
        mp3encoder = new lamejs.Mp3Encoder(2, sampleRate, kbps);

        const blockSize = 1152;
        for (let i = 0; i < left16.length; i += blockSize) {
          const leftChunk = left16.subarray(i, i + blockSize);
          const rightChunk = right16.subarray(i, i + blockSize);
          const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
          if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
      }

      const endBuf = mp3encoder.flush();
      if (endBuf.length > 0) mp3Data.push(endBuf);

      return new Blob(mp3Data, { type: "audio/mp3" });
    }

    async function createZip(files) {
      const zip = new JSZip();
      for (const file of files) {
        zip.file(file.name, file.blob);
      }
      return await zip.generateAsync({ type: "blob" });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    cutButton.addEventListener("click", async () => {
      clearMessage();
      fileListDiv.classList.add("hidden");
      fileListDiv.innerHTML = "";

      const file = audioFileInput.files[0];
      if (!file) {
        showError("Choisis un fichier audio.");
        return;
      }

      let segmentSeconds;
      if (segmentLengthSelect.value === "custom") {
        const custom = parseInt(customLengthInput.value, 10);
        if (!custom || custom <= 0) {
          showError("Entre une durée personnalisée valide.");
          return;
        }
        segmentSeconds = custom;
      } else {
        segmentSeconds = parseInt(segmentLengthSelect.value, 10);
      }

      try {
        showSuccess("Traitement en cours...");
        const arrayBuffer = await file.arrayBuffer();
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        const totalDuration = audioBuffer.duration;
        if (segmentSeconds >= totalDuration) {
          showError("La durée choisie est plus longue que le fichier audio.");
          return;
        }

        const totalParts = Math.ceil(totalDuration / segmentSeconds);
        const baseName = sanitizeName(file.name);
        const createdFiles = [];

        fileListDiv.classList.remove("hidden");

        for (let i = 0; i < totalParts; i++) {
          const startSec = i * segmentSeconds;
          const endSec = Math.min((i + 1) * segmentSeconds, totalDuration);
          const blob = encodeMp3FromAudioBuffer(audioBuffer, startSec, endSec);
          const partName = `${baseName}_${String(i + 1).padStart(3, "0")}.mp3`;

          createdFiles.push({ name: partName, blob });

          const item = document.createElement("div");
          item.className = "item";
          item.textContent = partName;
          fileListDiv.appendChild(item);
        }

        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js";
        script.onload = async () => {
          const zipBlob = await createZip(createdFiles);
          downloadBlob(zipBlob, `${baseName}_decoupe.zip`);
          showSuccess("Découpe terminée. Le ZIP est téléchargé.");
        };
        document.body.appendChild(script);

      } catch (error) {
        showError("Impossible de lire ce fichier audio dans le navigateur.");
      }
    });
  </script>
</body>
</html>
